<!DOCTYPE html>
<html>
<head>
    <title>AI Reader - 登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-header .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-body {
            padding: 30px;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 25px;
            background: #f5f5f7;
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            display: block;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #aaa;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 12px;
        }

        .guest-btn {
            width: 100%;
            padding: 14px;
            background: #f5f5f7;
            color: #555;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .guest-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f0f2ff;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            border-color: #4285f4;
            background: #f8f9ff;
        }

        .google-btn svg {
            width: 18px;
            height: 18px;
        }

        .features {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .features h3 {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }

        .feature-item .icon {
            font-size: 16px;
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 0;
                min-height: 100vh;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">📚</div>
            <h1>AI Reader</h1>
            <p>智能英语阅读学习助手</p>
        </div>
        
        <div class="login-body">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" onclick="switchTab('register')">注册</button>
            </div>

            <div id="message" class="message"></div>

            <!-- 登录表单 -->
            <div id="login-panel" class="form-panel active">
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="submit-btn" id="login-btn">登录</button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div id="register-panel" class="form-panel">
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="reg-username" placeholder="至少2个字符" required minlength="2">
                    </div>
                    <div class="form-group">
                        <label>邮箱 (可选)</label>
                        <input type="email" id="reg-email" placeholder="用于找回密码">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="reg-password" placeholder="设置密码" required minlength="1">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="reg-password2" placeholder="再次输入密码" required>
                    </div>
                    <button type="submit" class="submit-btn" id="reg-btn">注册</button>
                </form>
            </div>

            <div class="divider"><span>或</span></div>

            <!-- 游客试用 -->
            <button class="guest-btn" onclick="handleGuest()" id="guest-btn">
                先试用，不注册
            </button>

            <!-- Google 登录 -->
            {% if google_enabled %}
            <button class="google-btn" onclick="handleGoogleLogin()" id="google-btn">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                使用 Google 账号登录
            </button>
            {% endif %}

            <div class="features">
                <h3>功能特点</h3>
                <div class="feature-list">
                    <div class="feature-item">
                        <span class="icon">📖</span>
                        <span>PDF/EPUB阅读</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">🔍</span>
                        <span>点击查词</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">🧠</span>
                        <span>智能复习</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">📱</span>
                        <span>多设备同步</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
            
            document.querySelector(`.tab-btn:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
            document.getElementById(`${tab}-panel`).classList.add('active');
            
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        function hideMessage() {
            const msg = document.getElementById('message');
            msg.className = 'message';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '登录中...';

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showMessage('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showMessage(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;

            if (password !== password2) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showMessage('注册成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showMessage(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }

        // 游客登录
        async function handleGuest() {
            const btn = document.getElementById('guest-btn');
            btn.disabled = true;
            btn.textContent = '正在创建...';

            try {
                const res = await fetch('/guest_login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showMessage('游客模式已开启，正在跳转...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    showMessage(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '先试用，不注册';
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '先试用，不注册';
            }
        }

        // Google 登录（需要配置 GOOGLE_CLIENT_ID 环境变量）
        async function handleGoogleLogin() {
            showMessage('正在连接 Google...', 'success');
            // Google Sign-In 由 Google Identity Services 库处理
            // 这里需要在 head 中引入 Google 的 JS SDK
            if (typeof google === 'undefined' || !google.accounts) {
                showMessage('Google 登录服务加载中，请稍后重试', 'error');
                return;
            }
            google.accounts.id.prompt();
        }

        // 回车键提交
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const form = input.closest('form');
                    if (form) form.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>

    {% if google_enabled %}
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        window.onload = function() {
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: '{{ google_client_id }}',
                    callback: async function(response) {
                        try {
                            const res = await fetch('/auth/google', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id_token: response.credential })
                            });
                            const data = await res.json();
                            if (data.status === 'success') {
                                showMessage('登录成功，正在跳转...', 'success');
                                setTimeout(() => { window.location.href = '/'; }, 500);
                            } else {
                                showMessage(data.message, 'error');
                            }
                        } catch (err) {
                            showMessage('Google 登录失败', 'error');
                        }
                    }
                });
            }
        };
    </script>
    {% endif %}
</body>
</html>
