<!DOCTYPE html>
<html>
<head>
    <title>AI Reader - 找回密码</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 36px 30px;
            text-align: center;
        }

        .header .icon { font-size: 40px; margin-bottom: 12px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 13px; }

        .body { padding: 30px; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus { border-color: #667eea; }
        .form-group input::placeholder { color: #aaa; }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover { text-decoration: underline; }

        .step { display: none; }
        .step.active { display: block; }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: background 0.3s;
        }

        .step-dot.active { background: #667eea; }
        .step-dot.done { background: #27ae60; }

        @media (max-width: 480px) {
            .container { border-radius: 0; min-height: 100vh; }
            .header { padding: 28px 20px; }
            .body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🔑</div>
            <h1>找回密码</h1>
            <p>通过注册时的用户名和邮箱验证身份</p>
        </div>

        <div class="body">
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
            </div>

            <div id="message" class="message"></div>

            <!-- 第一步：验证身份 -->
            <div id="step-1" class="step active">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="forgot-username" placeholder="输入你的用户名" required>
                </div>
                <div class="form-group">
                    <label>注册邮箱</label>
                    <input type="email" id="forgot-email" placeholder="输入注册时的邮箱" required>
                </div>
                <button class="btn" onclick="verifyIdentity()" id="verify-btn">验证身份</button>
            </div>

            <!-- 第二步：设置新密码 -->
            <div id="step-2" class="step">
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="new-password" placeholder="至少4个字符" minlength="4" required>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" id="new-password2" placeholder="再次输入新密码" required>
                </div>
                <button class="btn" onclick="resetPassword()" id="reset-btn">重置密码</button>
            </div>

            <a href="/login" class="back-link">返回登录</a>
        </div>
    </div>

    <script>
        let resetToken = '{{ reset_token | default("") }}';

        // 如果 URL 带有 token 参数，直接跳到第二步
        if (resetToken) {
            goToStep(2);
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        function goToStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${n}`).classList.add('active');
            for (let i = 1; i <= 2; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.remove('active', 'done');
                if (i < n) dot.classList.add('done');
                else if (i === n) dot.classList.add('active');
            }
        }

        async function verifyIdentity() {
            const username = document.getElementById('forgot-username').value.trim();
            const email = document.getElementById('forgot-email').value.trim();
            const btn = document.getElementById('verify-btn');

            if (!username || !email) {
                showMessage('请填写用户名和邮箱', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '验证中...';
            hideMessage();

            try {
                const res = await fetch('/api/forgot_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                const data = await res.json();

                if (data.reset_token) {
                    resetToken = data.reset_token;
                    showMessage('验证成功，请设置新密码', 'success');
                    setTimeout(() => {
                        hideMessage();
                        goToStep(2);
                        document.getElementById('new-password').focus();
                    }, 800);
                } else {
                    showMessage(data.message, data.status === 'success' ? 'success' : 'error');
                    btn.disabled = false;
                    btn.textContent = '验证身份';
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '验证身份';
            }
        }

        async function resetPassword() {
            const pw = document.getElementById('new-password').value;
            const pw2 = document.getElementById('new-password2').value;
            const btn = document.getElementById('reset-btn');

            if (!pw || pw.length < 4) {
                showMessage('密码至少4个字符', 'error');
                return;
            }
            if (pw !== pw2) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }
            if (!resetToken) {
                showMessage('重置令牌缺失，请重新验证', 'error');
                goToStep(1);
                return;
            }

            btn.disabled = true;
            btn.textContent = '重置中...';
            hideMessage();

            try {
                const res = await fetch('/api/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: pw })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                } else {
                    showMessage(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '重置密码';
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '重置密码';
            }
        }

        // 回车键提交
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const step1 = document.getElementById('step-1');
                    if (step1.classList.contains('active')) {
                        verifyIdentity();
                    } else {
                        resetPassword();
                    }
                }
            });
        });
    </script>
</body>
</html>
